front:
  text: 金籙十回度人午朝轉經儀
  hash: sha256:3a52d3d6cef0b4f40535bae834763a1181e02656f867bcb4f5eb62af474b1c01
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0190_HFL_000-001a, image: hfl/0267/0267-160.png}
body:
  text: 師堂序立法事高功跪啓具位臣某重伸上啓靈寶玄中大法師真君靈寶經師君籍師君度師君正一天師君女師嗣師系師君靈寶監齋大法師真君赤明開圖黍珠授受一派宗師恭望師慈俯回洞鑒臣聞元始開圖真文設教可以和天安地可以保國寧家普度無窮是名上品再登師闕啓請經科臣今入意引領官衆升壇轉誦太上洞玄靈寶無量度人上品妙經第五遍至第八遍敬為祝延萬壽保天長存仰祈師造特賜主盟庶使響徹三天聲聞九地恩波浩蕩惠澤隆深普及含生均沾利益專俟恩命宣演經科臣等干冒師嚴下情不勝虔禱之至領衆升壇恭行典式唱道引至壇前序立次第升壇上香信禮各禮師存念如法太上玄一九皇吐精三五七變洞觀幽冥日月垂光下徹神庭俠照六合太一皇寧帝君金闕金書不傾五老奉符天地同成使我不死以致真靈却遏萬邪禍害咸平上朝天皇還老返嬰大帝有制百神敬聽鳴法鼓二十四通無上玄元太上道君召出臣等身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出關啓所言臣今為某入意願得太上降賜十方正真生氣流注臣等身中令臣所啓速逹徑御無上三十二天元始上帝至尊御前請稱法位具位臣某等謹同誠上啓太上無極大道虛無自然元始天尊妙無上帝玄皇高聖太上玉晨大道君靈寶天尊妙有上帝混沌萬變玄元老君道德天尊至真上帝昊天玉皇上帝元陽慈父大道君靈寶玉母大道君南極天皇上帝北極紫微大帝朱陵度命天尊后土皇地祇十方無極太上靈寶天尊巳得道大聖衆至真諸君丈人三十二天帝君東華南極西靈北真玄都玉京金闕七寶瓊臺紫微上宮靈寶至真明皇道君上相上宰上保上傅玄中太皇上帝高真三十六部尊經玄中大法師五帝三官四司九府日月五星南辰北斗二十八宿璇璣玉衡列象星真十方無極至真大神飛天神王長生無量度人君天真皇人妙行真人靈寶三師監齋大法師侍經五帝玉童玉女典經玉郎三洞侍經靈寶官屬三界五帝大勳魔王三界官屬應感真靈恭望洪慈俯回洞鑒臣聞寶珠五丈乃天尊神智之優為聖境十方竼氣彌羅之所化欲恩光之旁燭託經法之弘宣臣某仙品未充豈任大乘之責宿緣有幸側聞上品之書願以午朝重開祕藏欽聖靈之在上披情意以先聞微顯闡幽而遍計則五六七八之數被風濡化願功加於乾坤艮巽之方稽首皈依無極大道經心開悟解受持讀誦至心歸依十方道寶當願衆生起心回向一切信禮師普上法橋無有障礙宿命讃侍經宣第五回開經科敷座吟靜念如法開經玄藴呪請轉法輪師題經誦經畢解座吟侍經回向智惠頌師同齋官旋至東北方上香再拜臣恭以經演五回蓋法乎天數誠存一念諒鑒於人心恭惟東北方無極太上靈寶天尊東北方無極飛天神王長生大聖無量度人君上鎮太霄尊居艮地自臨至泰成發生萬物之功旋斗歷箕有回度五常之妙伏願書功上奏儲祉下臨順正星𨇠俾諸福之畢至鎮安國祚庶萬方以來朝具有表文謹當宣告宣表關焚化侍經宣第六回開經科節次同前旋至東南方上香再拜臣恭以玉軸卷舒數符隂六金真嘯詠響徹三天恭惟東南方無極太上靈寶天尊東南方無極飛天神王長生大聖無量度人君處四碧宮居重巽位在昔浮黎之國親受玄微至今神霄之天專司濟度伏願轉經文之六遍奏功賞於諸天天罡太一之大聖扶持百祥皆集鶉尾壽星之吉曜臨照何福不臻具有表文謹當宣告宣表關焚化侍經宣第七回開經科節次同前旋至西南方上香再拜臣恭以七轉召萬神既成經法三天煥九景如對靈光恭惟西南方無極太上靈寶天尊西南方無極飛天神王長生大聖無量度人君坤位居尊人門布化遐盻極覽每接引於學徒窮思畢精妙發揮於經旨伏願奏善於虛皇之御書功於始素之天人道長生自遏除於鬼録天光下燭常渙發於身田具有表文謹當宣告宣表關焚化侍經宣第八回開經科節次同前旋至西北方上香再拜臣恭以梵氣周回經終八遍魔王保舉功奏諸天恭惟西北方無極太上靈寶天尊西北方無極飛天神王長生大聖無量度人君法道自然體乾不息雍和萬化蓋將以立教存心撫掌兆民一是以度人為本伏願書名金籙列字王清存道氣養真精神將來舍開天門閉地戶邪不能干具有表文謹當宣告宣表關焚化三聞經發願復爐如故仙靈仙官金童玉女五帝五嶽神仙真人三氣正神左右龍虎君天仙地仙五靈香官當令召致十方正氣自然生金液丹碧芝英百靈衆真交會在此香火爐前當願十方仙童玉女接侍香煙傳臣向來所啓之言速逹徑御無上三十二天元始上帝至尊几前直壇引下壇詣幕謝師師上香再拜具位臣某虔誠上啓靈寶玄中大法師真君靈寶經師君籍師君度師君正一天師君女師嗣師系師君靈寶監齋大法師真君赤明聞圖黍珠授受一派宗師恭望師慈俯觀謝悃臣向來引領官衆升壇轉誦太上洞玄靈寶無量度人上品妙經第五遍至第八遍幸以周圓徑為祝延萬壽保天長存仰荷師恩冥扶默相謹伸謁謝尚冀成終俟琅函卷軸之時至玉輅回鸞之日還功報德鏤骨銘心上弘靈寶之科以廣慈悲之化臣等干冒師嚴下情無任不勝戰栗之至向來念善金籙十回度人午朝轉經儀
